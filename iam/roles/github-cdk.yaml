AWSTemplateFormatVersion: 2010-09-09

Description: the role that will perform ops in GitHub Actions pipeline.


Parameters:
  github-cdk-perms-boundary:
    Type: String
    Description: Name of the existing customer-managed IAM policy
    Default: github-cdk-perms-boundary

Resources:
  MyIamRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: MyApplicationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/${github-cdk-perms-boundary}

Outputs:
  RoleArn:
    Description: ARN of the created IAM Role
    Value: !GetAtt MyIamRole.Arn

  RoleName:
    Description: Name of the created IAM Role
    Value: !Ref MyIamRole